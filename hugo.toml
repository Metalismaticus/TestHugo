baseURL = "/"
languageCode = "en-us"
title = "Saasify"
theme = "saasify"

pygmentsCodeFences = true
pygmentsUseClasses = true
enableEmoji = true
enableGitInfo = false

defaultContentLanguage = "ru"
defaultContentLanguageInSubdir = true

[taxonomies]
  category = "categories"
  tag = "tags"

paginate = 6
paginatePath = "page"

[params]
  description = ""
  author = "Chaoming Li"
  logo = "/images/logo.svg"

  [params.cta]
    enable = true
    title = "Ready to Build Your SaaS Website?"
    description = "Join companies already using our theme to create beautiful, high-performance websites."
    gradient_from = "#2563eb"
    gradient_to   = "#7c3aed"
    gradient_angle = 30
    [params.cta.primary_button]
      text = "Get Started Free"
      url  = "/get-started"
    [params.cta.secondary_button]
      text = "Book Demo"
      url  = "/demo"

  [params.social]
    linkedin = "https://linkedin.com/in/chaomingli"
    twitter  = "https://twitter.com/lichaoming"
    bluesky  = "https://bsky.app/profile/bsky.app"
    youtube  = "https://youtube.com/@chaomingli"
    facebook = "https://facebook.com/lichaoming"
    instagram= "https://instagram.com/lichaoming"
    github   = "https://github.com/chaoming"

  [params.footer]
    column_1_title = "Features"
    column_2_title = "COMPANY"
    column_3_title = "LEGAL"

  [params.header]
    background = "bg-white/80 backdrop-blur-sm"
    border = "border-b border-gray-100"
    [params.header.logo]
      src = "/images/logo.svg"
    [params.header.menu]
      spacing = "space-x-8"
      [params.header.menu.dropdown]
        width = "w-72"
        container_padding = "py-6"
        item_padding = "px-8 py-3"
        background = "bg-white"
        border = "border border-gray-100"
        shadow = "shadow-xl"
        radius = "rounded-lg"
        text_color = "text-gray-700"
        hover_background = "hover:bg-gray-50"
        text_size = "text-sm"
    [params.header.buttons]
      [params.header.buttons.signIn]
        text = "Sign in"
        url  = "/signin"
      [params.header.buttons.getStarted]
        text = "Get Started"
        url  = "/get-started"

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

[module]
  [module.hugoVersion]
    extended = true
    min = "0.80.0"

[build]
  writeStats = true
  [build.buildStats]
    enable = true

[security.funcs]
  getenv = ['^HUGO_', '^CI$']

[languages]

  [languages.ru]
    languageName = "Русский"
    languageCode = "ru"
    title = "Saasify"
    weight = 1

    # Локализация кнопок в шапке (перекрывает глобальные)
    [languages.ru.params.header.buttons.signIn]
      text = "Войти"
      url  = "/ru/signin"
    [languages.ru.params.header.buttons.getStarted]
      text = "Начать"
      url  = "/ru/get-started"

    [languages.ru.menus]
      # Главное меню RU
      [[languages.ru.menus.main]]
        name = "Возможности"
        weight = 1
        [languages.ru.menus.main.params]
          has_submenu = true
          submenu = [
            { name = "Производительность", url = "/ru/features/performance/" },
            { name = "Дизайн-система",     url = "/ru/features/design-system/" },
            { name = "Опыт разработчика",  url = "/ru/features/developer-experience/" }
          ]
      [[languages.ru.menus.main]]
        name = "Тарифы"
        url  = "/ru/pricing"
        weight = 2
      [[languages.ru.menus.main]]
        name = "Новости"
        url  = "/ru/news/"
        weight = 3
      [[languages.ru.menus.main]]
        name = "Гайды"
        url  = "/ru/guides/"
        weight = 4
      [[languages.ru.menus.main]]
        name = "Кейсы"
        url  = "/ru/cases/"
        weight = 5
      [[languages.ru.menus.main]]
        name = "Компания"
        weight = 6
        [languages.ru.menus.main.params]
          has_submenu = true
          submenu = [
            { name = "О нас",  url = "/ru/company/" },
            { name = "Карьера", url = "/ru/careers/" }
          ]

      # Футер RU — колонка 1
      [[languages.ru.menus.footer_column_1]]
        name = "Производительность"
        url  = "/ru/features/performance/"
        weight = 1
      [[languages.ru.menus.footer_column_1]]
        name = "Дизайн-система"
        url  = "/ru/features/design-system/"
        weight = 2
      [[languages.ru.menus.footer_column_1]]
