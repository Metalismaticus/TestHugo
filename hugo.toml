        weight = 3

      # Футер RU — колонка 2
      [[languages.ru.menus.footer_column_2]]
        name = "Новости"
        url  = "/ru/news/"
        weight = 1
      [[languages.ru.menus.footer_column_2]]
        name = "О нас"
        url  = "/ru/company/"
        weight = 2
      [[languages.ru.menus.footer_column_2]]
        name = "Карьера"
        url  = "/ru/careers/"
        weight = 3

      # Футер RU — колонка 3
      [[languages.ru.menus.footer_column_3]]
        name = "Лицензия"
        url  = "/ru/license"
        weight = 1
      [[languages.ru.menus.footer_column_3]]
